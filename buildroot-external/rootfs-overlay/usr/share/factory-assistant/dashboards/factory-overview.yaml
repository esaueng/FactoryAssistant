# Factory Assistant — "Plant overview" dashboard template.
#
# Design spec: docs/UI_DESIGN.md (§6 screen inventory). The frontend fork
# ships custom:fa-machine-card and custom:fa-andon-view; this template wires
# those native read-only cards by default for the factory UI.
#
# COMMISSIONING: entity IDs below are EXAMPLES following the naming
# convention in docs/INDUSTRIAL_DEFAULTS.md §2 (sensor.<area>_<machine>_
# <measurement>). They render as "entity not found" until replaced with the
# plant's real entities. KPI sensors are defined in configuration.yaml
# (template: block).
#
# SAFETY: monitoring only — no control affordances on any view
# (docs/SAFETY_BOUNDARY.md, docs/UI_DESIGN.md §10).
title: Plant overview
views:
  # ── Overview: KPI strip + machine tiles per line ─────────────────────────
  - title: Overview
    path: overview
    icon: mdi:factory
    cards:
      - type: glance
        title: Shift status
        columns: 4
        entities:
          - entity: sensor.plant_machines_running
            name: Running
          - entity: sensor.plant_active_alerts
            name: Alerts
          - entity: sensor.plant_shift_output
            name: Output
          - entity: sensor.plant_power_now
            name: Power
      - type: custom:fa-machine-card
        title: Press 01
        line: Line 1
        cell: Stamping
        machine: Press 01
        status_entity: binary_sensor.line1_press01_running
        tap_action: detail_only
        control_affordances_allowed: false
      - type: custom:fa-machine-card
        title: Press 03
        line: Line 1
        cell: Stamping
        machine: Press 03
        status_entity: binary_sensor.line1_press03_running
        oee_entity: sensor.line1_press03_oee
        maintenance_entity: binary_sensor.line1_press03_service_due
        tap_action: detail_only
        control_affordances_allowed: false
      - type: custom:fa-machine-card
        title: Weld 02
        line: Line 1
        cell: Weld
        machine: Weld 02
        status_entity: binary_sensor.line1_weld02_running
        tap_action: detail_only
        control_affordances_allowed: false
      - type: custom:fa-machine-card
        title: Pack 01
        line: Line 1
        cell: Packaging
        machine: Pack 01
        status_entity: binary_sensor.line1_pack01_running
        tap_action: detail_only
        control_affordances_allowed: false
      - type: custom:fa-machine-card
        title: Extruder 01
        line: Line 2
        cell: Extrusion
        machine: Extruder 01
        status_entity: binary_sensor.line2_extr01_running
        tap_action: detail_only
        control_affordances_allowed: false
      - type: custom:fa-machine-card
        title: Extruder 02
        line: Line 2
        cell: Extrusion
        machine: Extruder 02
        status_entity: binary_sensor.line2_extr02_running
        tap_action: detail_only
        control_affordances_allowed: false
      - type: custom:fa-machine-card
        title: Winder 01
        line: Line 2
        cell: Winding
        machine: Winder 01
        status_entity: binary_sensor.line2_wind01_running
        tap_action: detail_only
        control_affordances_allowed: false

  # ── Line detail: one view per line; duplicate and adapt ──────────────────
  - title: Line 1
    path: line1
    icon: mdi:robot-industrial
    cards:
      - type: custom:fa-machine-card
        title: Press 03
        line: Line 1
        cell: Stamping
        machine: Press 03
        status_entity: binary_sensor.line1_press03_running
        oee_entity: sensor.line1_press03_oee
        maintenance_entity: binary_sensor.line1_press03_service_due
        tap_action: detail_only
        control_affordances_allowed: false
      - type: gauge
        entity: sensor.line1_press03_motor_temp
        name: Press 03 motor temperature
        unit: "°C"
        min: 0
        max: 120
        needle: true
        severity:
          green: 0
          yellow: 70
          red: 90
      - type: history-graph
        title: Line 1 — last 8 hours
        hours_to_show: 8
        entities:
          - sensor.line1_press03_rate
          - sensor.line1_press03_motor_temp

  # ── Alerts (andon board) ─────────────────────────────────────────────────
  - title: Alerts
    path: alerts
    icon: mdi:alert
    cards:
      - type: custom:fa-andon-view
        title: Active alerts
        acknowledge_is_bookkeeping: true
        safety_alarm_claim_allowed: false
        alerts:
          - entity: binary_sensor.line1_press03_overtemp_alert
            name: "Press 03 — motor overtemperature"
            severity: critical
            ack_entity: input_boolean.line1_press03_overtemp_ack
          - entity: binary_sensor.line2_extr01_pressure_alert
            name: "Extruder 01 — barrel pressure high"
            severity: warning
            ack_entity: input_boolean.line2_extr01_pressure_ack
          - entity: binary_sensor.line1_press03_service_due
            name: "Press 03 — service hours reached"
            severity: info
      - type: markdown
        content: >-
          **Factory Assistant is a monitoring tool, not a safety device.**
          Alerts here are informational. Dashboards and notifications must
          never be the sole means of detecting a hazardous condition
          (see docs/SAFETY_BOUNDARY.md).

  # ── Energy ───────────────────────────────────────────────────────────────
  - title: Energy
    path: energy
    icon: mdi:transmission-tower
    cards:
      - type: markdown
        content: >-
          Configure plant energy monitoring under **Settings → Dashboards →
          Energy** (incomer meter plus per-line/per-machine CT clamps), then
          the cards below come alive.
      # - type: energy-distribution        # enable after energy configuration
      - type: history-graph
        title: Plant power — last 24 hours
        hours_to_show: 24
        entities:
          - sensor.plant_power_now

  # ── Performance (OEE) ────────────────────────────────────────────────────
  # OEE = Availability × Performance × Quality. Sensors are defined in
  # packages/oee_example.yaml (per machine + sensor.plant_oee rollup).
  - title: OEE
    path: oee
    icon: mdi:gauge
    cards:
      - type: gauge
        entity: sensor.plant_oee
        name: Plant OEE
        unit: "%"
        min: 0
        max: 100
        needle: true
        severity:
          red: 0
          yellow: 60
          green: 85
      - type: glance
        title: Press 03 — OEE factors
        columns: 4
        entities:
          - entity: sensor.line1_press03_oee
            name: OEE
          - entity: sensor.line1_press03_availability
            name: Availability
          - entity: sensor.line1_press03_performance
            name: Performance
          - entity: sensor.line1_press03_quality
            name: Quality
      - type: history-graph
        title: OEE — last 24 hours
        hours_to_show: 24
        entities:
          - sensor.line1_press03_oee
          - sensor.plant_oee

  # ── Maintenance ──────────────────────────────────────────────────────────
  - title: Maintenance
    path: maintenance
    icon: mdi:wrench-clock
    cards:
      - type: entities
        title: Runtime counters
        state_color: true
        entities:
          - entity: sensor.line1_press03_runtime_hours
            name: "Press 03 — hours since service"
          - entity: input_number.line1_press03_service_hours
            name: "Press 03 — service interval"
          - entity: binary_sensor.line1_press03_service_due
            name: "Press 03 — service due"
          - entity: sensor.line2_extr01_runtime_hours
            name: "Extruder 01 — hours since service"
      - type: markdown
        content: >-
          Pattern: counter-based reminders (packages/maintenance_example.yaml)
          — an automation notifies when a runtime counter passes its service
          threshold. After the work order closes, maintenance restarts accrual
          by running the **Press 03 — reset service counter** script from its
          entity dialog (kept off the board so monitoring views stay read-only,
          docs/UI_DESIGN.md §10.1). Take a Supervisor **backup** before every
          maintenance window.
