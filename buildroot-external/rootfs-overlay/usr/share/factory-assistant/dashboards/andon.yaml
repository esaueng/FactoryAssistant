# Factory Assistant — "Andon board" dashboard template.
#
# Design spec: docs/UI_DESIGN.md §6 (Alerts / andon board). Active alerts
# grouped by severity (critical → warning → info), each row carrying its
# acknowledge state. Acknowledge is *bookkeeping only*: an alert stays visible
# until its underlying condition clears — ack never implies a machine was made
# safe (UI_DESIGN §10.3, docs/SAFETY_BOUNDARY.md).
#
# The frontend fork's native custom:fa-andon-view handles the severity
# grouping, acknowledge state, and read-only detail behavior. The acknowledge
# helpers and the "auto-clear ack when the condition clears" automation are
# defined in packages/andon_example.yaml — copy and adapt them per alert at
# commissioning.
#
# DEPLOY as a dedicated alerts wallboard (UI_DESIGN §7):
#   http://factory-assistant.local:8123/andon/board   (kiosk browser, view-only user)
#
# COMMISSIONING: the binary_sensor.*_alert entities and their input_boolean.*_ack
# helpers are EXAMPLES (naming: docs/INDUSTRIAL_DEFAULTS.md §2). They read
# "entity not found" until mapped to real plant alerts.
#
# SAFETY: informational only. No control affordances; no element is named or
# styled as e-stop, interlock, or safety alarm (UI_DESIGN §10.1–10.2).
title: Andon
views:
  - title: Board
    path: board
    icon: mdi:alert-decagram
    type: sections
    max_columns: 3
    cards: []
    sections:
      - type: grid
        title: Active alerts
        cards:
          - type: custom:fa-andon-view
            title: Active alerts
            acknowledge_is_bookkeeping: true
            safety_alarm_claim_allowed: false
            alerts:
              - entity: binary_sensor.line1_press03_overtemp_alert
                name: "Press 03 — motor overtemperature"
                severity: critical
                ack_entity: input_boolean.line1_press03_overtemp_ack
              - entity: binary_sensor.line2_extr01_pressure_alert
                name: "Extruder 01 — barrel pressure high"
                severity: warning
                ack_entity: input_boolean.line2_extr01_pressure_ack
              - entity: binary_sensor.line1_press03_service_due
                name: "Press 03 — service hours reached"
                severity: info

      # ── Standing disclaimer (UI_DESIGN §10.5, mandatory on this view) ─────
      - type: grid
        title: ""
        cards:
          - type: markdown
            content: >-
              **Factory Assistant is a monitoring tool, not a safety device.**
              Alerts here are informational. Acknowledging an alert is
              bookkeeping only and does not make any machine safe. Dashboards
              and notifications must never be the sole means of detecting a
              hazardous condition (docs/SAFETY_BOUNDARY.md).
