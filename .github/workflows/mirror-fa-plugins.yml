# Mirror the Home Assistant Supervisor system plugins into the Factory Assistant
# registry and publish the branded Factory Assistant landingpage image so the FA
# update channel resolves every component from ghcr.io/esaueng.
#
# The channel (version-service/stable.json) names ghcr.io/esaueng/{arch}-hassio-cli
# etc.; without these images a running Supervisor 404s on the plugin pulls. The
# plugins dns/audio/multicast/observer carry no user-visible branding
# (config-only), and the CLI plugin's banner lives in a separate cli binary
# (a later rebrand fork). The first-boot landingpage is not mirrored from
# upstream: this workflow builds landingpage/ so the visible preparing page is
# Factory Assistant branded.
#
# Source tags are the current upstream plugin versions; the target tag is the FA
# release version (channel default 2026.6.0). Re-pin source tags when upstream
# plugin versions move. Push auth prefers a GHCR_PAT secret (write:packages),
# falling back to GITHUB_TOKEN (which can create these NEW org packages).
#
# After a successful run, make the 5 new plugin packages PUBLIC (the appliance
# pulls anonymously).
name: Mirror FA plugins + landingpage

on:
  workflow_dispatch:
    inputs:
      fa_version:
        description: "FA release tag to publish plugins under (matches the channel)"
        required: true
        default: "2026.6.0"
  push:
    branches: ["mirror-fa-plugins"]
    paths:
      - ".github/workflows/mirror-fa-plugins.yml"

env:
  FA_VERSION: "2026.6.0"

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror plugins (upstream -> esaueng)
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Mirror the 5 system plugins (re-tagged to the FA version)
        run: |
          set -euxo pipefail
          ver="${{ inputs.fa_version || env.FA_VERSION }}"
          copy() { # $1 = plugin slug, $2 = upstream source tag
            docker buildx imagetools create \
              -t "ghcr.io/esaueng/amd64-hassio-$1:${ver}" \
              "ghcr.io/home-assistant/amd64-hassio-$1:$2"
          }
          copy cli       2026.05.0
          copy dns       2026.02.0
          copy audio     2026.02.0
          copy observer  2026.02.0
          copy multicast 2026.02.0

      - name: Build and publish the Factory Assistant landingpage
        run: |
          set -euxo pipefail
          ver="${{ inputs.fa_version || env.FA_VERSION }}"
          docker buildx build \
            --platform linux/amd64 \
            --pull \
            --push \
            -t "ghcr.io/esaueng/generic-x86-64-homeassistant:landingpage" \
            -t "ghcr.io/esaueng/generic-x86-64-homeassistant:${ver}-landingpage" \
            --label "org.opencontainers.image.version=${ver}" \
            landingpage

      - name: Next steps
        run: |
          {
            echo "Mirrored to ghcr.io/esaueng/amd64-hassio-{cli,dns,audio,observer,multicast}:${{ inputs.fa_version || env.FA_VERSION }}"
            echo "Published branded landingpage to ghcr.io/esaueng/generic-x86-64-homeassistant:landingpage"
            echo ""
            echo "NEXT: make the 5 plugin packages and the generic-x86-64-homeassistant package **public** (org Packages settings) — the appliance pulls anonymously."
          } >> "$GITHUB_STEP_SUMMARY"
