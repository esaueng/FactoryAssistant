# Publish the Factory Assistant update channel to GitHub Pages.
#
# The appliance's Supervisor polls the channel document anonymously at
#   https://esaueng.github.io/FactoryAssistantOS/stable.json
# (see buildroot-external/rootfs-overlay/usr/sbin/hassos-supervisor and
# branding/identity.env: FAOS_VERSION_CHANNEL_URL). This workflow serves
# version-service/{stable,beta,dev}.json at the matching URLs, and the channel
# schema at its $id (schema/channel.schema.json), so the single source of truth
# under version-service/ is what reaches the field — no hand-copied duplicate.
# The patched Supervisor also requests /apparmor_{stable,beta,dev}.txt from
# the same site.
#
# PREREQUISITES (one-time, in repo Settings — see version-service/README.md):
#   1. A PUBLIC Pages site. The appliance fetches the channel anonymously, so
#      the site must be reachable without credentials. On the Free org plan that
#      means the repo must be public; alternatively a paid plan (Pro/Team) can
#      serve a public Pages site from a private repo.
#   2. Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
#      The default GITHUB_TOKEN cannot enable Pages itself, so this is manual;
#      once set, this workflow deploys on every channel change to main.
name: Publish update channel (Pages)

on:
  push:
    branches: ["main"]
    paths:
      - "version-service/*.json"
      - "version-service/apparmor_*.txt"
      - "version-service/schema/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One publish at a time, and never cancel an in-flight one: a half-applied
# deploy would leave the field channel in an undefined state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Validate channel + deploy to Pages
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate channel documents against schema
        # The field Supervisor parses these documents; never publish one the
        # schema rejects. Mirrors the check in lint.yml and verifies the
        # filename/channel contract the Supervisor URL template depends on.
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet check-jsonschema
          for channel in stable beta dev; do
            check-jsonschema --schemafile version-service/schema/channel.schema.json \
              "version-service/${channel}.json"
          done
          python - <<'PY'
          import json
          from pathlib import Path

          for channel in ("stable", "beta", "dev"):
              path = Path("version-service") / f"{channel}.json"
              with path.open(encoding="utf-8") as fh:
                  data = json.load(fh)
              if data.get("channel") != channel:
                  raise SystemExit(f"{path} declares channel {data.get('channel')!r}")
          PY

      - name: Assemble Pages site
        # Copy only the public channel artifacts so the URLs are clean:
        #   /{stable,beta,dev}.json       <- channels the Supervisor polls
        #   /apparmor_{stable,beta,dev}.txt <- Supervisor AppArmor profiles
        #   /schema/channel.schema.json   <- matches the schema's own $id
        run: |
          set -euo pipefail
          mkdir -p _site/schema
          for channel in stable beta dev; do
            cp "version-service/${channel}.json" "_site/${channel}.json"
            cp "version-service/apparmor_${channel}.txt" "_site/apparmor_${channel}.txt"
          done
          cp version-service/schema/channel.schema.json  _site/schema/channel.schema.json
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Factory Assistant &mdash; update channel</title>
          <h1>Factory Assistant update channel</h1>
          <p>Endpoints served from this site:</p>
          <ul>
            <li><a href="stable.json">stable.json</a> &mdash; the stable update channel the appliance polls</li>
            <li><a href="beta.json">beta.json</a> &mdash; the beta update channel endpoint</li>
            <li><a href="dev.json">dev.json</a> &mdash; the dev update channel endpoint</li>
            <li><a href="apparmor_stable.txt">apparmor_stable.txt</a> &mdash; Supervisor AppArmor profile</li>
            <li><a href="apparmor_beta.txt">apparmor_beta.txt</a> &mdash; Supervisor AppArmor profile for beta</li>
            <li><a href="apparmor_dev.txt">apparmor_dev.txt</a> &mdash; Supervisor AppArmor profile for dev</li>
            <li><a href="schema/channel.schema.json">schema/channel.schema.json</a> &mdash; channel document schema</li>
          </ul>
          HTML

      - name: Configure Pages
        # Pages must already be enabled with Source "GitHub Actions" (prereq #2
        # above). The default GITHUB_TOKEN cannot self-enable Pages, so there is
        # deliberately no enablement: true here.
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
